  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SymbolBox · 여기있어 특수문자</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: "Pretendard GOV", sans-serif; }

    @keyframes slideUp { from { transform: translateY(14px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    .t-in  { animation: slideUp .22s ease forwards; }
    .t-out { animation: fadeOut .28s ease forwards; }

    /* Symbol card */
    .sym-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      position: relative;
      overflow: hidden;
      background: #fff;
      border: 1px solid #f3f4f6;
      border-radius: 0.75rem;
      width: 100%;
      height: 88px;
      font-size: 1.75rem;
      cursor: pointer;
      user-select: none;
      transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease, color .12s ease;
    }
    .sym-card:hover  { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,.09); border-color: #a5b4fc; color: #4f46e5; }
    .sym-card:active { transform: translateY(0); }
    .sym-card:focus  { outline: none; box-shadow: 0 0 0 3px rgba(99,102,241,.35); }

    .sym-name {
      font-size: 10px;
      color: #bbbfc5;
      line-height: 1;
      max-width: calc(100% - 6px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: color .12s ease;
      pointer-events: none;
    }
    .sym-card:hover .sym-name { color: #818cf8; }

    /* Small card (recent) */
    .sym-sm {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: #fff;
      border: 1px solid #f3f4f6;
      border-radius: 0.5rem;
      width: 44px;
      height: 44px;
      font-size: 1.15rem;
      cursor: pointer;
      user-select: none;
      transition: border-color .12s, color .12s, box-shadow .12s;
    }
    .sym-sm:hover { border-color: #a5b4fc; color: #4f46e5; box-shadow: 0 4px 12px rgba(99,102,241,.15); }
    .sym-sm:focus { outline: none; box-shadow: 0 0 0 3px rgba(99,102,241,.35); }

    /* Tab scroll fade */
    .tabs-wrap { position: relative; }
    .tabs-wrap::after {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 32px;
      background: linear-gradient(to right, transparent, #f3f4f6);
      pointer-events: none;
    }

    /* Ripple */
    .ripple { position: absolute; border-radius: 50%; background: rgba(99,102,241,.22); transform: scale(0); animation: rpl .45s linear; pointer-events: none; }
    @keyframes rpl { to { transform: scale(4); opacity: 0; } }

    /* Tabs */
    .tab-btn { border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; flex-shrink: 0; white-space: nowrap; }
    .tab-btn.on { color: #4f46e5; border-bottom-color: #4f46e5; }

    /* Scrollbar */
    ::-webkit-scrollbar { height: 4px; width: 4px; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

    /* ── 문서작성 탭 전용 스타일 ── */
    .doc-section {
      background: #fff;
      border: 1px solid #f3f4f6;
      border-radius: 1rem;
      padding: 1rem 1.25rem 1.25rem;
      margin-bottom: 1rem;
    }
    .doc-section-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #f3f4f6;
    }
    .doc-section-title {
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      letter-spacing: 0.04em;
    }
    .doc-section-badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 999px;
      font-weight: 500;
    }
    .badge-rule   { background: #ede9fe; color: #5b21b6; }
    .badge-opt    { background: #d1fae5; color: #065f46; }
    .badge-unit   { background: #fef3c7; color: #92400e; }
    .badge-punct  { background: #e0f2fe; color: #0c4a6e; }
    .badge-num    { background: #fce7f3; color: #9d174d; }
    .badge-etc    { background: #f1f5f9; color: #475569; }

    /* 항목 순서 시각화 */
    .seq-flow {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
      padding: 0.6rem 0.75rem;
      background: #fafafa;
      border-radius: 0.5rem;
      border: 1px solid #f3f4f6;
    }
    .seq-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .seq-chip-sym {
      font-size: 15px;
      font-weight: 600;
      color: #4f46e5;
      line-height: 1;
    }
    .seq-chip-label {
      font-size: 9px;
      color: #9ca3af;
    }
    .seq-arrow {
      font-size: 12px;
      color: #d1d5db;
      margin: 0 1px;
      align-self: flex-start;
      margin-top: 6px;
    }

    /* 문서작성 카드 */
    .doc-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      position: relative;
      overflow: hidden;
      background: #fafafa;
      border: 1px solid #f3f4f6;
      border-radius: 0.65rem;
      width: 100%;
      height: 72px;
      font-size: 1.5rem;
      cursor: pointer;
      user-select: none;
      transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease, background .12s ease, color .12s ease;
    }
    .doc-card:hover  { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,.08); border-color: #a5b4fc; background: #fff; color: #4f46e5; }
    .doc-card:active { transform: translateY(0); }
    .doc-card:focus  { outline: none; box-shadow: 0 0 0 3px rgba(99,102,241,.35); }
    .doc-card .sym-name { color: #c4c8ce; }
    .doc-card:hover .sym-name { color: #818cf8; }

    .doc-grid {
      display: grid;
      gap: 6px;
      grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

<!-- HEADER -->
<header class="bg-white shadow-sm sticky top-0 z-40">
  <div class="max-w-screen-xl mx-auto px-6 py-3 flex items-center gap-3">
    <div class="flex items-center gap-1.5 shrink-0">
      <span class="material-icons text-indigo-600" style="font-size:26px">grid_view</span>
      <span class="font-bold text-2xl text-gray-800 tracking-tight">SymbolBox</span>
    </div>
    <div class="flex-1 relative">
      <span class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" style="font-size:18px">search</span>
      <input id="q" type="text" placeholder="문자 이름으로 검색…"
        class="w-full pl-9 pr-9 py-2.5 rounded-xl border border-gray-200 bg-gray-50 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:bg-white transition"
        aria-label="특수문자 검색"/>
      <button id="clearBtn" onclick="clearSearch()" aria-label="검색어 지우기"
        class="absolute right-2.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors hidden">
        <span class="material-icons" style="font-size:18px">close</span>
      </button>
    </div>
  </div>
</header>

<!-- MAIN -->
<main class="flex-1 max-w-screen-xl w-full mx-auto px-6 pt-5 pb-12">

  <!-- Recent -->
  <section id="recentSec" class="mb-5 hidden">
    <div class="flex items-center mb-2">
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest flex items-center gap-1">
        <span class="material-icons text-amber-400" style="font-size:14px">history</span>최근 복사
      </p>
      <button id="clearRecentBtn" onclick="clearRecent()" aria-label="최근 복사 전체 삭제"
        class="ml-auto flex items-center gap-0.5 text-xs text-gray-300 hover:text-red-400 transition-colors">
        <span class="material-icons" style="font-size:13px">delete_outline</span>전체 삭제
      </button>
    </div>
    <div id="recentGrid" class="flex flex-wrap gap-1.5"></div>
  </section>

  <!-- Tabs -->
  <div class="tabs-wrap overflow-x-auto border-b border-gray-200 mb-3">
    <div id="tabs" class="flex"></div>
  </div>

  <!-- Symbol count -->
  <p id="countLabel" class="text-xs text-gray-400 mb-2"></p>

  <!-- Normal Grid -->
  <div id="grid" class="grid gap-2" style="grid-template-columns: repeat(auto-fill, minmax(88px, 1fr))"></div>

  <!-- 문서작성 탭 전용 패널 -->
  <div id="docPanel" class="hidden"></div>

  <div id="empty" class="hidden text-center py-16 text-gray-400 text-sm">
    <span class="material-icons block mb-2" style="font-size:40px">search_off</span>
    <span>검색 결과가 없어요</span>
    <button onclick="clearSearch()"
      class="mt-3 flex items-center gap-1 mx-auto text-xs text-indigo-400 hover:text-indigo-600 transition-colors">
      <span class="material-icons" style="font-size:14px">refresh</span>검색어 초기화
    </button>
  </div>
</main>

<!-- FOOTER -->
<footer class="text-center py-4 text-xs text-gray-400">
  <a href="https://litt.ly/chichiboo" target="_blank" rel="noopener"
     class="hover:text-indigo-500 transition-colors">
    Created by. 교육뮤지컬 꿈꾸는 치수쌤
  </a>
</footer>

<!-- TOAST -->
<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 pointer-events-none opacity-0">
  <div class="flex items-center gap-2 bg-gray-900 text-white text-sm font-medium px-5 py-2.5 rounded-2xl shadow-xl">
    <span class="material-icons text-green-400" style="font-size:16px">check_circle</span>
    <span id="toastTxt"></span>
  </div>
</div>

/* ============================================================
   RECENT
============================================================ */
function getR() {
  try { return JSON.parse(localStorage.getItem(LS) || '[]'); }
  catch(e) { return []; }
}
function pushR(c) {
  var r = getR().filter(function(x){ return x !== c; });
  r.unshift(c);
  if (r.length > MAX_R) r = r.slice(0, MAX_R);
  localStorage.setItem(LS, JSON.stringify(r));
  renderRecent();
}
function renderRecent() {
  var sec = document.getElementById('recentSec');
  var g   = document.getElementById('recentGrid');
  var r   = getR();
  if (!r.length) { sec.classList.add('hidden'); return; }
  sec.classList.remove('hidden');
  g.innerHTML = '';
  r.forEach(function(c) { g.appendChild(makeCard(c, null, true)); });
}
function clearRecent() {
  localStorage.removeItem(LS);
  renderRecent();
}

/* ============================================================
   CARD
============================================================ */
function getCharName(c) {
  for (var i = 0; i < D.length; i++) {
    if (D[i][0] === c) return D[i][1];
  }
  return '';
}

function makeCard(c, name, small, isDoc) {
  var b = document.createElement('button');
  b.className = small ? 'sym-sm' : (isDoc ? 'doc-card' : 'sym-card');
  var displayName = name || getCharName(c);
  b.title = c + (displayName ? '  ' + displayName : '');
  b.setAttribute('aria-label', (displayName || c) + ' 복사');

  if (!small) {
    var charSpan = document.createElement('span');
    charSpan.textContent = c;
    b.appendChild(charSpan);
    if (displayName) {
      var nameSpan = document.createElement('span');
      nameSpan.className = 'sym-name';
      nameSpan.textContent = displayName;
      b.appendChild(nameSpan);
    }
  } else {
    b.textContent = c;
  }

  b.addEventListener('click', function(e) { addRipple(b, e); copyChar(c); });
  return b;
}

/* ============================================================
   RIPPLE
============================================================ */
function addRipple(el, e) {
  var s = document.createElement('span');
  s.className = 'ripple';
  var r = el.getBoundingClientRect();
  var sz = Math.max(r.width, r.height);
  s.style.width  = sz + 'px';
  s.style.height = sz + 'px';
  s.style.left   = (e.clientX - r.left - sz / 2) + 'px';
  s.style.top    = (e.clientY - r.top  - sz / 2) + 'px';
  el.appendChild(s);
  s.addEventListener('animationend', function() { s.remove(); });
}

/* ============================================================
   COPY
============================================================ */
var toastTimer = null;
function copyChar(c) {
  function done() { pushR(c); showToast(c + '  복사 완료!'); }
  if (navigator.clipboard) {
    navigator.clipboard.writeText(c).then(done).catch(function() { fbCopy(c, done); });
  } else {
    fbCopy(c, done);
  }
}
function fbCopy(c, cb) {
  var ta = document.createElement('textarea');
  ta.value = c;
  ta.style.position = 'fixed';
  ta.style.opacity  = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  ta.remove();
  cb();
}
function showToast(msg) {
  var el = document.getElementById('toast');
  document.getElementById('toastTxt').textContent = msg;
  el.classList.remove('t-out');
  el.classList.add('t-in');
  el.style.opacity = '1';
  el.style.pointerEvents = 'auto';
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function() {
    el.classList.remove('t-in');
    el.classList.add('t-out');
    setTimeout(function() {
      el.style.opacity = '0';
      el.style.pointerEvents = 'none';
    }, 290);
  }, 1800);
}

/* ============================================================
   문서작성 탭 렌더
============================================================ */
function renderDocPanel() {
  var panel = document.getElementById('docPanel');
  panel.innerHTML = '';

  DOC_SECTIONS.forEach(function(sec) {
    var wrap = document.createElement('div');
    wrap.className = 'doc-section';

    /* 헤더 */
    var header = document.createElement('div');
    header.className = 'doc-section-header';
    header.innerHTML =
      '<span class="material-icons text-gray-400" style="font-size:15px">' + sec.icon + '</span>' +
      '<span class="doc-section-title">' + sec.title + '</span>' +
      '<span class="doc-section-badge ' + sec.badgeClass + '">' + sec.badge + '</span>';
    wrap.appendChild(header);

    /* 규정 순서 시각화 (항목 구분 기호 섹션만) */
    if (sec.seq) {
      var noteEl = document.createElement('p');
      noteEl.style.cssText = 'font-size:11px;color:#9ca3af;margin-bottom:8px;';
      noteEl.textContent = sec.note;
      wrap.appendChild(noteEl);

      var flow = document.createElement('div');
      flow.className = 'seq-flow';
      sec.seq.forEach(function(item, idx) {
        var chip = document.createElement('div');
        chip.className = 'seq-chip';
        chip.innerHTML =
          '<span class="seq-chip-sym">' + item.sym + '</span>' +
          '<span class="seq-chip-label">' + item.label + '</span>';
        flow.appendChild(chip);
        if (idx < sec.seq.length - 1) {
          var arrow = document.createElement('span');
          arrow.className = 'seq-arrow';
          arrow.textContent = '→';
          flow.appendChild(arrow);
        }
      });
      wrap.appendChild(flow);
    }

    /* 카드 그리드 */
    var grid = document.createElement('div');
    grid.className = 'doc-grid';
    sec.chars.forEach(function(entry) {
      grid.appendChild(makeCard(entry[0], entry[1], false, true));
    });
    wrap.appendChild(grid);

    panel.appendChild(wrap);
  });
}

/* ============================================================
   RENDER (일반 탭)
============================================================ */
function getFiltered() {
  var qn = q.trim().toLowerCase();
  var seen = {};
  var result = [];
  for (var i = 0; i < D.length; i++) {
    var entry = D[i];
    var ch = entry[0], nm = entry[1], ct = entry[2];
    if (cat !== 'all' && ct !== cat) continue;
    var key = ch + '_' + ct;
    if (cat === 'all') key = ch;
    if (seen[key]) continue;
    seen[key] = true;
    if (!qn) { result.push(entry); continue; }
    if (nm.toLowerCase().indexOf(qn) !== -1 || ch === qn) result.push(entry);
  }
  return result;
}

function renderGrid() {
  var g    = document.getElementById('grid');
  var lbl  = document.getElementById('countLabel');
  var emEl = document.getElementById('empty');
  var panel= document.getElementById('docPanel');

  /* 문서작성 탭 */
  if (cat === 'doc') {
    g.classList.add('hidden');
    panel.classList.remove('hidden');
    emEl.classList.add('hidden');
    lbl.textContent = '';
    renderDocPanel();
    return;
  }

  /* 일반 탭 */
  panel.classList.add('hidden');
  g.classList.remove('hidden');
  g.innerHTML = '';

  var data = getFiltered();
  if (!data.length) {
    emEl.classList.remove('hidden');
    lbl.textContent = '';
    return;
  }
  emEl.classList.add('hidden');
  lbl.textContent = data.length + '개';

  var frag = document.createDocumentFragment();
  for (var i = 0; i < data.length; i++) {
    frag.appendChild(makeCard(data[i][0], data[i][1], false, false));
  }
  g.appendChild(frag);
}

/* ============================================================
   TABS
============================================================ */
function renderTabs() {
  var t = document.getElementById('tabs');
  t.innerHTML = '';
  CATS.forEach(function(c) {
    var b = document.createElement('button');
    var isActive = (c.id === cat);
    b.className = 'tab-btn flex items-center gap-1 px-3 py-2.5 text-xs font-semibold text-gray-500' + (isActive ? ' on' : '');
    b.setAttribute('data-cat', c.id);
    b.innerHTML = '<span class="material-icons" style="font-size:14px">' + c.icon + '</span>' + c.label;
    b.addEventListener('click', function() {
      cat = c.id;
      document.querySelectorAll('.tab-btn').forEach(function(x) { x.classList.remove('on'); });
      b.classList.add('on');
      renderGrid();
    });
    t.appendChild(b);
  });
}

/* ============================================================
   SEARCH
============================================================ */
function clearSearch() {
  var qEl = document.getElementById('q');
  qEl.value = '';
  q = '';
  document.getElementById('clearBtn').classList.add('hidden');
  renderGrid();
  qEl.focus();
}

document.getElementById('q').addEventListener('input', function(e) {
  q = e.target.value;
  document.getElementById('clearBtn').classList.toggle('hidden', !q);

  if (q && cat !== 'all') {
    cat = 'all';
    document.querySelectorAll('.tab-btn').forEach(function(x) { x.classList.remove('on'); });
    var allTab = document.querySelector('.tab-btn[data-cat="all"]');
    if (allTab) allTab.classList.add('on');
  }

  renderGrid();
});

/* ============================================================
   INIT
============================================================ */
renderTabs();
renderGrid();
renderRecent();
