<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SymbolBox · 여기있어 특수문자</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-gov.min.css" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: "Pretendard GOV", sans-serif; }

    @keyframes slideUp { from { transform: translateY(14px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    .t-in  { animation: slideUp .22s ease forwards; }
    .t-out { animation: fadeOut .28s ease forwards; }

    /* Symbol card */
    .sym-card {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: #fff;
      border: 1px solid #f3f4f6;
      border-radius: 0.75rem;
      width: 100%;
      height: 52px;
      font-size: 1.25rem;
      cursor: pointer;
      user-select: none;
      transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease, color .12s ease;
    }
    .sym-card:hover  { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,.09); border-color: #a5b4fc; color: #4f46e5; }
    .sym-card:active { transform: translateY(0); }
    .sym-card:focus  { outline: none; box-shadow: 0 0 0 3px rgba(99,102,241,.35); }

    /* Small card (recent) */
    .sym-sm {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: #fff;
      border: 1px solid #f3f4f6;
      border-radius: 0.5rem;
      width: 36px;
      height: 36px;
      font-size: 1rem;
      cursor: pointer;
      user-select: none;
      transition: border-color .12s, color .12s;
    }
    .sym-sm:hover { border-color: #a5b4fc; color: #4f46e5; }

    /* Ripple */
    .ripple { position: absolute; border-radius: 50%; background: rgba(99,102,241,.22); transform: scale(0); animation: rpl .45s linear; pointer-events: none; }
    @keyframes rpl { to { transform: scale(4); opacity: 0; } }

    /* Tabs */
    .tab-btn { border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; flex-shrink: 0; white-space: nowrap; }
    .tab-btn.on { color: #4f46e5; border-bottom-color: #4f46e5; }

    /* Scrollbar */
    ::-webkit-scrollbar { height: 4px; width: 4px; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

<!-- HEADER -->
<header class="bg-white shadow-sm sticky top-0 z-40">
  <div class="max-w-5xl mx-auto px-4 py-3 flex items-center gap-3">
    <div class="flex items-center gap-1.5 shrink-0">
      <span class="material-icons text-indigo-600" style="font-size:24px">grid_view</span>
      <span class="font-bold text-xl text-gray-800 tracking-tight">SymbolBox</span>
    </div>
    <div class="flex-1 relative">
      <span class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" style="font-size:18px">search</span>
      <input id="q" type="text" placeholder="문자 이름으로 검색…"
        class="w-full pl-9 pr-4 py-2 rounded-xl border border-gray-200 bg-gray-50 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:bg-white transition"/>
    </div>
  </div>
</header>

<!-- MAIN -->
<main class="flex-1 max-w-5xl w-full mx-auto px-4 pt-4 pb-10">

  <!-- Recent -->
  <section id="recentSec" class="mb-5 hidden">
    <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2 flex items-center gap-1">
      <span class="material-icons text-amber-400" style="font-size:14px">history</span>최근 복사
    </p>
    <div id="recentGrid" class="flex flex-wrap gap-1.5"></div>
  </section>

  <!-- Tabs -->
  <div class="overflow-x-auto border-b border-gray-200 mb-3">
    <div id="tabs" class="flex"></div>
  </div>

  <!-- Symbol count -->
  <p id="countLabel" class="text-xs text-gray-400 mb-2"></p>

  <!-- Grid -->
  <div id="grid" class="grid gap-1.5" style="grid-template-columns: repeat(auto-fill, minmax(52px, 1fr))"></div>
  <p id="empty" class="hidden text-center py-16 text-gray-400 text-sm">
    <span class="material-icons block mb-1" style="font-size:40px">search_off</span>검색 결과 없음
  </p>
</main>

<!-- FOOTER -->
<footer class="text-center py-4 text-xs text-gray-400">
  <a href="https://litt.ly/chichiboo" target="_blank" rel="noopener"
     class="hover:text-indigo-500 transition-colors">
    Created by. 교육뮤지컬 꿈꾸는 치수쌤
  </a>
</footer>

<!-- TOAST -->
<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 pointer-events-none opacity-0">
  <div class="flex items-center gap-2 bg-gray-900 text-white text-sm font-medium px-5 py-2.5 rounded-2xl shadow-xl">
    <span class="material-icons text-green-400" style="font-size:16px">check_circle</span>
    <span id="toastTxt"></span>
  </div>
</div>

/* ============================================================
   STATE
============================================================ */
var cat = 'pop';
var q   = '';
var LS  = 'sb_v3';
var MAX_R = 12;

/* ============================================================
   RECENT
============================================================ */
function getR() {
  try { return JSON.parse(localStorage.getItem(LS) || '[]'); }
  catch(e) { return []; }
}
function pushR(c) {
  var r = getR().filter(function(x){ return x !== c; });
  r.unshift(c);
  if (r.length > MAX_R) r = r.slice(0, MAX_R);
  localStorage.setItem(LS, JSON.stringify(r));
  renderRecent();
}
function renderRecent() {
  var sec = document.getElementById('recentSec');
  var g   = document.getElementById('recentGrid');
  var r   = getR();
  if (!r.length) { sec.classList.add('hidden'); return; }
  sec.classList.remove('hidden');
  g.innerHTML = '';
  r.forEach(function(c) { g.appendChild(makeCard(c, true)); });
}

/* ============================================================
   CARD
============================================================ */
function makeCard(c, small) {
  var b = document.createElement('button');
  b.className = small ? 'sym-sm' : 'sym-card';
  b.textContent = c;
  b.title = c;
  b.addEventListener('click', function(e) { addRipple(b, e); copyChar(c); });
  return b;
}

/* ============================================================
   RIPPLE
============================================================ */
function addRipple(el, e) {
  var s = document.createElement('span');
  s.className = 'ripple';
  var r = el.getBoundingClientRect();
  var sz = Math.max(r.width, r.height);
  s.style.width  = sz + 'px';
  s.style.height = sz + 'px';
  s.style.left   = (e.clientX - r.left - sz / 2) + 'px';
  s.style.top    = (e.clientY - r.top  - sz / 2) + 'px';
  el.appendChild(s);
  s.addEventListener('animationend', function() { s.remove(); });
}

/* ============================================================
   COPY
============================================================ */
var toastTimer = null;
function copyChar(c) {
  function done() { pushR(c); showToast(c + '  복사 완료!'); }
  if (navigator.clipboard) {
    navigator.clipboard.writeText(c).then(done).catch(function() { fbCopy(c, done); });
  } else {
    fbCopy(c, done);
  }
}
function fbCopy(c, cb) {
  var ta = document.createElement('textarea');
  ta.value = c;
  ta.style.position = 'fixed';
  ta.style.opacity  = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  ta.remove();
  cb();
}
function showToast(msg) {
  var el = document.getElementById('toast');
  document.getElementById('toastTxt').textContent = msg;
  el.classList.remove('t-out');
  el.classList.add('t-in');
  el.style.opacity = '1';
  el.style.pointerEvents = 'auto';
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function() {
    el.classList.remove('t-in');
    el.classList.add('t-out');
    setTimeout(function() {
      el.style.opacity = '0';
      el.style.pointerEvents = 'none';
    }, 290);
  }, 1800);
}

/* ============================================================
   RENDER
============================================================ */
function getFiltered() {
  var qn = q.trim().toLowerCase();
  var seen = {};
  var result = [];
  for (var i = 0; i < D.length; i++) {
    var entry = D[i];
    var ch = entry[0], nm = entry[1], ct = entry[2];
    if (cat !== 'all' && ct !== cat) continue;
    var key = ch + '_' + ct; // allow same char in different categories
    if (cat === 'all') key = ch; // dedupe when showing all
    if (seen[key]) continue;
    seen[key] = true;
    if (!qn) { result.push(entry); continue; }
    if (nm.toLowerCase().indexOf(qn) !== -1 || ch === qn) result.push(entry);
  }
  return result;
}

function renderGrid() {
  var g   = document.getElementById('grid');
  var em  = document.getElementById('cnt');
  var lbl = document.getElementById('countLabel');
  var emEl= document.getElementById('empty');
  var data = getFiltered();

  g.innerHTML = '';

  if (!data.length) {
    emEl.classList.remove('hidden');
    lbl.textContent = '';
    return;
  }
  emEl.classList.add('hidden');
  lbl.textContent = data.length + '개';

  var frag = document.createDocumentFragment();
  for (var i = 0; i < data.length; i++) {
    var entry = data[i];
    var b = makeCard(entry[0], false);
    b.title = entry[0] + '  ' + entry[1];
    frag.appendChild(b);
  }
  g.appendChild(frag);
}

/* ============================================================
   TABS
============================================================ */
function renderTabs() {
  var t = document.getElementById('tabs');
  t.innerHTML = '';
  CATS.forEach(function(c) {
    var b = document.createElement('button');
    var isActive = (c.id === cat);
    b.className = 'tab-btn flex items-center gap-1 px-3 py-2.5 text-xs font-semibold text-gray-500' + (isActive ? ' on' : '');
    b.innerHTML = '<span class="material-icons" style="font-size:14px">' + c.icon + '</span>' + c.label;
    b.addEventListener('click', function() {
      cat = c.id;
      document.querySelectorAll('.tab-btn').forEach(function(x) { x.classList.remove('on'); });
      b.classList.add('on');
      renderGrid();
    });
    t.appendChild(b);
  });
}

/* ============================================================
   SEARCH
============================================================ */
document.getElementById('q').addEventListener('input', function(e) {
  q = e.target.value;
  renderGrid();
});

/* ============================================================
   INIT
============================================================ */
renderTabs();
renderGrid();
renderRecent();
